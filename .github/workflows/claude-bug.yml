name: Claude — Fix Bug

on:
  issues:
    types: [labeled]

jobs:
  fix:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, php-cs-fixer
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 80"
          track_progress: true
          prompt: |
            Draft a first-pass fix for the bug in issue #${{ github.event.issue.number }}
            in this repo. Goal: open a PR I can take over — not a verified fix.

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            How to work:
            - Read CLAUDE.md and orient yourself in this codebase first.
            - Locate the most likely cause in the code. Make one best-guess
              hypothesis and commit to it — do not explore alternatives.
            - Apply the minimal change that would fix it under that hypothesis.
              Backend goes in lib/, frontend in src/.
            - Do NOT run builds, tests, linters, or `npm run deploy`. Skip validation entirely.
            - Open the PR even if unverified. State your hypothesis and what
              I should double-check in the PR description so I can pick it up.
