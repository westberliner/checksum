name: Claude — Prepare Release

on:
  pull_request:
    types: [closed]

jobs:
  prepare:
    if: >
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'bug') ||
       contains(github.event.pull_request.labels.*.name, 'enhancement'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: "--max-turns 40"
          track_progress: true
          prompt: |
            Use the `prepare-release` skill to open a release PR.

            Merged PR: #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Label: ${{ contains(github.event.pull_request.labels.*.name, 'enhancement') && 'enhancement' || 'bug' }}
            Merge SHA: ${{ github.event.pull_request.merge_commit_sha }}

            Body:
            ${{ github.event.pull_request.body }}
