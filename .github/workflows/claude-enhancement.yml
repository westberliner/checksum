name: Claude — Implement Enhancement

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'enhancement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 60"
          track_progress: true
          prompt: |
            Implement issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Follow CLAUDE.md conventions:
            - Backend changes: Controller/Service in lib/ with PHPUnit test in tests/
            - Frontend changes: composable in src/composables/ with Vitest test
            - Update Changelog.md under [Unreleased]

            Run `npm run deploy` and fix errors until it passes before finishing.
